<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>系统测试页</title>
    <style>
        body { font-family: sans-serif; margin: 50px; text-align: center; }
        .box { padding: 20px; border: 1px solid #ccc; border-radius: 8px; max-width: 400px; margin: 0 auto; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #007BFF; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 20px; color: #333; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>静态资源加载成功</h2>
        <p>这个页面是 Nginx 直接响应的静态资源，没有经过 Java 后端。</p>
        
        <button onclick="testBackend()">测试后端负载均衡</button>
        <div id="result">等待测试...</div>
    </div>

    <script>
        function testBackend() {
            document.getElementById('result').innerText = "请求中...";
            // 随便请求一个你后端已有的接口，假设有一个查询用户的接口
            // 注意前面要加 /api 触发 Nginx 转发
            fetch('/api/user/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: "test", password: "123" })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('result').innerText = "后端响应: " + JSON.stringify(data);
            })
            .catch(error => {
                document.getElementById('result').innerText = "请求错误: " + error;
            });
        }
    </script>
</body>
</html>
