spring:
  threads:
    virtual:
      enabled: true # 开启 Java 21 虚拟线程，应对高并发

  datasource:
    dynamic:
      primary: user # 默认数据源
      datasource:
        user:
          url: jdbc:mysql://mysql-master:3306/mall_user?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
          username: root
          password: 123456
        product_master:
          url: jdbc:mysql://mysql-master:3306/mall_product?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
          username: root
          password: 123456
        product_slave:
          url: jdbc:mysql://mysql-slave:3306/mall_product?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
          username: root
          password: 123456
        stock:
          url: jdbc:mysql://mysql-master:3306/mall_stock?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
          username: root
          password: 123456
        order:
          url: jdbc:mysql://mysql-master:3306/mall_order?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
          username: root
          password: 123456

  data:
    redis:
      host: redis
      port: 6379
      password:

  kafka:
    bootstrap-servers: kafka:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: seckill-order-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.example.common.dto
        spring.json.value.default.type: com.example.common.dto.SeckillOrderMessage
    listener:
      missing-topics-fatal: false

seckill:
  kafka:
    topic-order-create: seckill-order-create
