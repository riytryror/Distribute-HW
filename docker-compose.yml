services:
  mysql-master:
    image: bitnami/mysql:8.0
    container_name: seckill-mysql-master
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_REPLICATION_MODE: master
      MYSQL_REPLICATION_USER: repl_user
      MYSQL_REPLICATION_PASSWORD: repl_pass
    ports:
      - "3307:3306"
    volumes:
      - ./mysql/master-data:/bitnami/mysql/data
      - ./mysql/init:/docker-entrypoint-initdb.d

  mysql-slave:
    image: bitnami/mysql:8.0
    container_name: seckill-mysql-slave
    depends_on:
      - mysql-master
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_REPLICATION_MODE: slave
      MYSQL_REPLICATION_USER: repl_user
      MYSQL_REPLICATION_PASSWORD: repl_pass
      MYSQL_MASTER_HOST: mysql-master
      MYSQL_MASTER_PORT_NUMBER: 3306
      MYSQL_MASTER_ROOT_PASSWORD: 123456
    ports:
      - "3308:3306"
    volumes:
      - ./mysql/slave-data:/bitnami/mysql/data

  redis:
    image: redis:7.0-alpine
    container_name: seckill-redis
    ports:
      - "6379:6379"

  kafka:
    image: bitnami/kafka:3.7
    container_name: seckill-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_KRAFT_CLUSTER_ID: abcdefghijklmnopqrstuv
      ALLOW_PLAINTEXT_LISTENER: "yes"

  mall-api-1:
    build:
      context: ./mall-api
      dockerfile: Dockerfile
    container_name: mall-api-8081
    ports:
      - "8081:8081"
    depends_on:
      - mysql-master
      - mysql-slave
      - redis
      - kafka
    # 通过命令行参数覆盖内部端口，实现多实例不同端口
    command: ["java", "-jar", "app.jar", "--server.port=8081"]

  mall-api-2:
    build:
      context: ./mall-api
      dockerfile: Dockerfile
    container_name: mall-api-8082
    ports:
      - "8082:8082"
    depends_on:
      - mysql-master
      - mysql-slave
      - redis
      - kafka
    command: ["java", "-jar", "app.jar", "--server.port=8082"]

  nginx:
    image: nginx:latest
    container_name: seckill-nginx
    ports:
      - "80:80"
    volumes:
      # 映射配置文件和静态资源目录，用于负载均衡和动静分离
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/html:/usr/share/nginx/html
    depends_on:
      - mall-api-1
      - mall-api-2